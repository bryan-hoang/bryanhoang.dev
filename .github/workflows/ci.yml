name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: voidzero-dev/setup-vp@379dedaa971cd3b6841bd2470708ed0d64013020 # v1
        with:
          cache: true
      - run: vp check
      - run: vp run check
      - run: vp run build
